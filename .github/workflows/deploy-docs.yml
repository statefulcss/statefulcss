name: Deploy Docs

on:
  push:
    branches:
      - main
    tags:
      - "docs@*"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_type == 'tag' && 'docs-production' || 'docs-preview' }}
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: deploy-docs-${{ github.ref_type == 'tag' && 'production' || 'preview' }}
      cancel-in-progress: ${{ github.ref_type != 'tag' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build docs
        run: pnpm turbo run build --filter=docs
        env:
          NODE_ENV: production

      - name: Build for Cloudflare
        working-directory: apps/docs
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy to Cloudflare (preview)
        if: github.ref_type != 'tag'
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy --env preview

      - name: Deploy to Cloudflare (production)
        if: github.ref_type == 'tag'
        working-directory: apps/docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** ${{ github.ref_type == 'tag' && 'production' || 'preview' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ github.ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
