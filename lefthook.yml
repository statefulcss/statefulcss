# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: prettier
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: eslint (apps/docs)
      root: "apps/docs/"
      glob: "*.{js,ts,tsx}"
      run: pnpm exec eslint --no-warn-ignored --max-warnings 0 {staged_files}
      stage_fixed: true

    - name: eslint (packages/stylelint-plugin)
      root: "packages/stylelint-plugin/"
      glob: "*.{js,ts,tsx}"
      run: pnpm exec eslint --no-warn-ignored --max-warnings 0 {staged_files}
      stage_fixed: true

    - name: stylelint (apps/docs)
      root: "apps/docs/"
      glob: "*.{css,scss}"
      run: pnpm exec stylelint --max-warnings 0 {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit
