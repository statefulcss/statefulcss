# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: prettier
      glob: "*.{ts,tsx,md}"
      run: npx prettier --check {staged_files}

    - name: eslint
      glob: "*.{js,ts,tsx}"
      run: npx eslint --max-warnings 0 {staged_files}

    - name: stylelint
      root: "apps/docs/"
      glob: "*.{css,scss}"
      run: npx stylelint --max-warnings 0 {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit
